  <script>
/* PharmaDesk V3 operator upgrades — fictional demo workflows only. */
(function () {
  const KEYS = {
    reviews: "pharmadesk.v3.reviewNotes",
    claimFlow: "pharmadesk.v3.claimFlow",
    medSync: "pharmadesk.v3.medSync",
    orderReviews: "pharmadesk.v3.orderReviews"
  };
  const esc = s => String(s == null ? "" : s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  const read = (k, f) => { try { return JSON.parse(localStorage.getItem(k)) || f; } catch (e) { return f; } };
  const write = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) {} };
  const today = () => TODAY.toISOString().slice(0, 10);
  const addDays = (date, days) => { const d = new Date(date + "T12:00:00"); d.setDate(d.getDate() + days); return d.toISOString().slice(0, 10); };
  const signedMoney = n => (Number(n) < 0 ? "−" : "") + money(Math.abs(Number(n) || 0));

  function addNavItem(view, icon, label, afterView) {
    const nav = document.getElementById("nav");
    if (!nav || document.querySelector(`[data-view="${view}"]`)) return;
    const btn = document.createElement("button");
    btn.className = "nav-item";
    btn.dataset.view = view;
    btn.innerHTML = `<span class="ni-ico">${icon}</span> ${label}`;
    const after = document.querySelector(`[data-view="${afterView}"]`);
    if (after && after.nextSibling) nav.insertBefore(btn, after.nextSibling); else nav.appendChild(btn);
    btn.onclick = () => navigate(view);
  }
  function wireNav() {
    addNavItem("medsync", "🗓️", "Med Sync", "careplans");
    addNavItem("auditdefense", "🛡️", "Audit Defense", "dailyclose");
  }

  function eco(c) {
    try { return claimEconomics(c); }
    catch (e) {
      const rx = Store.prescriptions.find(r => r.id === c.rxId);
      const drug = rx ? Store.findDrug(rx.drugId) : null;
      const reimbursement = (c.paid || 0) + (c.copay || 0);
      const acquisitionCost = drug && rx ? drug.cost * rx.qty : 0;
      const dirFee = c.dirFee || 0;
      const net = reimbursement - acquisitionCost - dirFee;
      return { rx, drug, reimbursement, acquisitionCost, dirFee, net, underwater: net < 0, macEligible: reimbursement < acquisitionCost };
    }
  }
  function econMini(e) {
    return `<div class="chip-row"><span class="badge ${e.net < 0 ? "red" : "green"}">Net ${signedMoney(e.net)}</span><span class="badge gray">Cost ${money(e.acquisitionCost || 0)}</span><span class="badge gray">DIR ${money(e.dirFee || 0)}</span></div>`;
  }

  function reviews() { return read(KEYS.reviews, {}); }
  function saveReview(rxId, reason, note) {
    const all = reviews();
    all[rxId] = { reason, note, date: today(), by: "K. Adeyemi, PharmD" };
    write(KEYS.reviews, all);
    toast(`Review note saved for ${rxId}`);
    render();
  }
  function reviewModal(rxId) {
    const rx = Store.prescriptions.find(r => r.id === rxId); if (!rx) return;
    const p = Store.findPatient(rx.patientId), d = Store.findDrug(rx.drugId);
    const body = `<p class="muted">Demo-only documentation note for a workflow review item.</p><dl class="kvs"><dt>Rx</dt><dd>${rx.id}</dd><dt>Profile</dt><dd>${p.first} ${p.last}</dd><dt>Item</dt><dd>${d.name} ${d.strength}</dd></dl><label class="field">Review reason<select id="rvReason"><option>Profile reviewed</option><option>Follow-up needed</option><option>Plan or payer issue</option><option>Documentation completed</option></select></label><label class="field" style="margin-top:10px">Note<textarea id="rvNote" rows="4" placeholder="Fictional demo note."></textarea></label>`;
    const m = openModal({ title: "Workflow review note", body, footer: `<button class="btn" id="rvCancel">Cancel</button><button class="btn primary" id="rvSave">Save</button>`, size: "lg" });
    $("#rvCancel").onclick = m.close;
    $("#rvSave").onclick = () => { saveReview(rxId, $("#rvReason").value, $("#rvNote").value || "Reviewed in demo workflow."); m.close(); };
  }

  const baseClinical = Views.clinicalops;
  Views.clinicalops = () => {
    const all = reviews();
    return `${baseClinical()}<div class="ops-card" style="margin-top:16px"><div class="section-head"><h2>Review documentation</h2><span class="badge blue">demo workflow</span></div><p class="muted">Adds a practical note layer to the review queue so exceptions do not simply disappear after being viewed.</p><div class="protocol-list">${Store.prescriptions.filter(r => ["intake", "verification", "pmp-review"].includes(r.status)).map(r => { const p = Store.findPatient(r.patientId), d = Store.findDrug(r.drugId), note = all[r.id]; return `<div class="queue-row"><span class="priority-dot ${note ? "green" : "amber"}"></span><div><b>${r.id} · ${p.first} ${p.last}</b><span class="action-note">${d.name} ${d.strength} · ${r.status}</span>${note ? `<span class="action-note">${esc(note.reason)} · ${fmtDate(note.date)}</span>` : `<span class="action-note">No review note saved</span>`}</div><button class="btn sm ${note ? "" : "primary"}" data-review-rx="${r.id}">${note ? "Update note" : "Add note"}</button></div>`; }).join("")}</div></div>`;
  };

  function claimFlow() { return read(KEYS.claimFlow, {}); }
  function getClaimFlow(id) { return claimFlow()[id] || { status: "new", due: addDays(today(), 2), note: "" }; }
  function saveClaimFlow(id, status, due, note) {
    const all = claimFlow();
    all[id] = { status, due, note, updated: today() };
    write(KEYS.claimFlow, all);
    toast(`${id} follow-up updated`);
    render();
  }
  function claimFlowModal(id) {
    const st = getClaimFlow(id);
    const body = `<label class="field">Follow-up status<select id="cfStatus"><option ${st.status === "new" ? "selected" : ""}>new</option><option ${st.status === "worked" ? "selected" : ""}>worked</option><option ${st.status === "payer contacted" ? "selected" : ""}>payer contacted</option><option ${st.status === "submitted" ? "selected" : ""}>submitted</option><option ${st.status === "resolved" ? "selected" : ""}>resolved</option><option ${st.status === "denied" ? "selected" : ""}>denied</option></select></label><label class="field" style="margin-top:10px">Due date<input id="cfDue" type="date" value="${esc(st.due)}"></label><label class="field" style="margin-top:10px">Note<textarea id="cfNote" rows="4">${esc(st.note || "")}</textarea></label>`;
    const m = openModal({ title: `Claim follow-up · ${id}`, body, footer: `<button class="btn" id="cfCancel">Cancel</button><button class="btn primary" id="cfSave">Save</button>`, size: "lg" });
    $("#cfCancel").onclick = m.close;
    $("#cfSave").onclick = () => { saveClaimFlow(id, $("#cfStatus").value, $("#cfDue").value, $("#cfNote").value); m.close(); };
  }
  Views.claimsops = () => {
    const rows = Store.claims.map(c => ({ c, e: eco(c), flow: getClaimFlow(c.id) })).sort((a, b) => a.e.net - b.e.net);
    return `<div class="ops-hero"><h2>Claims desk lifecycle</h2><p>Tracks rejected, underwater, and follow-up claims through a practical owner workflow: new, worked, payer contacted, submitted, resolved, or denied.</p></div><div class="ops-card"><div class="table-wrap"><table><thead><tr><th>Claim</th><th>Issue</th><th>Economics</th><th>Follow-up</th><th></th></tr></thead><tbody>${rows.map(x => { const issue = x.c.status === "rejected" ? `Reject ${x.c.rejectCode || ""}` : x.e.underwater ? "Underwater" : "Monitor"; return `<tr><td><b class="lk" data-claim="${x.c.id}">${x.c.id}</b><div class="muted small">${x.e.drug ? x.e.drug.name : x.c.rxId}</div></td><td><span class="badge ${x.c.status === "rejected" || x.e.underwater ? "red" : "green"}">${esc(issue)}</span><div class="muted small">${esc(x.c.payer)}</div></td><td>${econMini(x.e)}</td><td><span class="badge ${x.flow.status === "resolved" ? "green" : x.flow.status === "denied" ? "red" : x.flow.status === "submitted" ? "blue" : "amber"}">${esc(x.flow.status)}</span><div class="muted small">Due ${fmtDate(x.flow.due)}</div>${x.flow.note ? `<div class="muted small">${esc(x.flow.note)}</div>` : ""}</td><td><button class="btn sm primary" data-claim-flow="${x.c.id}">Update</button></td></tr>`; }).join("")}</tbody></table></div></div>`;
  };

  function medState() { return read(KEYS.medSync, {}); }
  function setMedState(pid, status) { const s = medState(); s[pid] = { status, date: today() }; write(KEYS.medSync, s); toast(`Med Sync ${status}`); render(); }
  function medRows() {
    return Store.patients.map(p => {
      const meds = Store.prescriptions.filter(r => r.patientId === p.id && r.maintenance);
      const due = meds.filter(r => r.dispensedOn).map(r => ({ rx: r, drug: Store.findDrug(r.drugId), due: addDays(r.dispensedOn, r.daysSupply || 30) }));
      const pdcVals = meds.map(r => r.pdc).filter(Boolean);
      const pdc = pdcVals.length ? Math.round(pdcVals.reduce((a, b) => a + b, 0) / pdcVals.length * 100) : null;
      return { p, meds, due, pdc, suggested: due[0]?.due || addDays(today(), 14) };
    }).filter(x => x.meds.length || (x.p.conditions || []).length > 1);
  }

  Views.auditdefense = () => `<div class="ops-hero"><h2>Audit defense</h2><p>Build a fictional audit response packet from open audit items.</p></div><div class="ops-card"><div class="table-wrap"><table><thead><tr><th>Audit</th><th>PBM</th><th>Risk</th><th>Due</th><th></th></tr></thead><tbody>${Store.audits.map(a => `<tr><td><b>${a.id}</b></td><td>${esc(a.pbm)}</td><td>${money(a.amountAtRisk - a.recouped)}</td><td>${fmtDate(a.due)}</td><td><button class="btn sm primary" data-audit-packet="${a.id}">Packet</button></td></tr>`).join("")}</tbody></table></div></div>`;

  const baseDashboard = Views.dashboard;
  Views.dashboard = () => `${baseDashboard()}<div class="ops-card" style="margin-top:16px"><div class="section-head"><h2>Implemented upgrades</h2><span class="badge green">active</span></div><p class="muted">Clinical review notes, claim follow-up lifecycle, Med Sync, purchasing recommendations, daily close packet, and audit packets are now active in the demo.</p><div class="row"><button class="btn" data-go="medsync">Open Med Sync</button><button class="btn" data-go="auditdefense">Open Audit Defense</button></div></div>`;

  const baseRender = render;
  render = function () {
    const result = baseRender.apply(this, arguments);
    wireNav();
    document.querySelectorAll("[data-review-rx]").forEach(b => b.onclick = () => reviewModal(b.dataset.reviewRx));
    document.querySelectorAll("[data-claim-flow]").forEach(b => b.onclick = () => claimFlowModal(b.dataset.claimFlow));
    document.querySelectorAll("[data-medsync]").forEach(b => b.onclick = () => { const [id, status] = b.dataset.medsync.split(":"); setMedState(id, status); });
    document.querySelectorAll("[data-audit-packet]").forEach(b => b.onclick = () => auditPacket(b.dataset.auditPacket));
    const dp = document.getElementById("dailyPacket"); if (dp) dp.onclick = dailyPacket;
    return result;
  };

  try { wireNav(); render(); } catch (e) { console.error("Operator upgrades failed", e); }
})();

    document.head.appendChild(style);
  }

  function applyMode(mode) {
    const selected = modes.includes(mode) ? mode : "desktop";
    document.body.classList.toggle("view-desktop", selected === "desktop");
    document.body.classList.toggle("view-mobile", selected === "mobile");
    document.documentElement.dataset.viewMode = selected;
    saveMode(selected);
    document.querySelectorAll("[data-view-mode]").forEach(btn => {
      const active = btn.dataset.viewMode === selected;
      btn.classList.toggle("active", active);
      btn.setAttribute("aria-pressed", active ? "true" : "false");
    });
  }

  function ensureSwitch() {
    if (document.getElementById("viewModeSwitch")) return;
    const wrap = document.createElement("div");
    wrap.id = "viewModeSwitch";
    wrap.className = "view-mode-switch";
    wrap.setAttribute("role", "group");
    wrap.setAttribute("aria-label", "View mode selector");
    wrap.innerHTML = `
      <span class="mode-label">View</span>
      <button type="button" data-view-mode="desktop" aria-pressed="false">Desktop</button>
      <button type="button" data-view-mode="mobile" aria-pressed="false">Mobile</button>
    `;
    document.body.appendChild(wrap);
    wrap.querySelectorAll("[data-view-mode]").forEach(btn => {
      btn.addEventListener("click", () => applyMode(btn.dataset.viewMode));
    });
  }

  function init() {
    injectStyles();
    ensureSwitch();
    applyMode(savedMode());
  }

  const baseRender = window.render;
  if (typeof baseRender === "function" && !window.__pharmadeskViewModeWrapped) {
    window.__pharmadeskViewModeWrapped = true;
    window.render = function () {
      const result = baseRender.apply(this, arguments);
      init();
      return result;
    };
  }

  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", init);
  else init();
})();

  <script>
/* PharmaDesk V3 — CSV Import Center.

(function () {

        expiry: ["expiry", "expiration", "expirationdate", "expdate"],
        schedule: ["schedule", "dea", "controlschedule"]
      },
      template: "id,name,strength,form,ndc,class,stock,reorder,cost,price,expReimb,dirRate,expiry,schedule\nD-2001,Lisinopril,10 mg,tablet,00000-0000-00,ACE inhibitor,300,100,0.04,0.18,0.11,0.12,2027-04-30,0"
    },
    prescriptions: {

      icon: "℞",
      required: ["id", "patientId", "drugId"],
      fields: {
        id: ["id", "rx", "rxnumber", "rx_number", "prescriptionid"],
        patientId: ["patientid", "patient_id", "patient", "profileid"],
        drugId: ["drugid", "drug_id", "itemid", "ndcid"],
        sig: ["sig", "directions", "instructions"],
        qty: ["qty", "quantity", "dispensedqty"],
        daysSupply: ["dayssupply", "days_supply", "ds"],
        refills: ["refills", "refillsremaining"],

        written: ["written", "writtendate", "datewritten"],
        status: ["status", "rxstatus", "workflowstatus"],
        dispensedOn: ["dispensedon", "filldate", "dispenseddate"],
        maintenance: ["maintenance", "maint"],
        pdc: ["pdc", "adherence"]
      },
      template: "id,patientId,drugId,sig,qty,daysSupply,refills,prescriber,written,status,dispensedOn,maintenance,pdc\nRX-7001,P-2001,D-2001,Take 1 tablet daily,30,30,5,Dr Demo,2026-06-01,verification,,true,0.92"
    },
    claims: {
      label: "Claims",
      icon: "💳",
      required: ["id", "rxId", "payer"],
      fields: {
        id: ["id", "claimid", "claim_id"],
        rxId: ["rxid", "rx_id", "rx", "rxnumber"],
        payer: ["payer", "plan", "insurance", "pbm"],
        bin: ["bin"],
        pcn: ["pcn"],
        billed: ["billed", "submitted", "submittedamount", "gross"],
        paid: ["paid", "planpaid", "paidamount"],
        copay: ["copay", "patientpay", "patientpaid"],
        status: ["status", "claimstatus"],
        rejectCode: ["rejectcode", "reject", "rejectreason"],
        dirFee: ["dirfee", "dir", "priceconcession"],
        appealStatus: ["appealstatus", "appeal"],
        recovered: ["recovered", "recovery", "appealrecovered"]
      },
      template: "id,rxId,payer,bin,pcn,billed,paid,copay,status,rejectCode,dirFee,appealStatus,recovered\nCLM-7001,RX-7001,Demo Plan,610000,DEMO,10.00,8.00,2.00,paid,,1.00,none,0"
    },
    audits: {
      label: "Audits",
      icon: "🛡️",
      required: ["id", "pbm"],
      fields: {
        id: ["id", "auditid", "audit_id"],
        pbm: ["pbm", "payer", "plan"],
        type: ["type", "audittype"],
        status: ["status"],
        started: ["started", "startdate"],
        due: ["due", "duedate", "deadline"],
        claims: ["claims", "claimcount", "count"],
        amountAtRisk: ["amountatrisk", "risk", "dollarsatrisk"],
        recouped: ["recouped", "clawback", "recovered"],
        reason: ["reason", "finding", "auditreason"],
        action: ["action", "nextaction", "notes"]
      },
      template: "id,pbm,type,status,started,due,claims,amountAtRisk,recouped,reason,action\nAUD-7001,Demo PBM,Desk audit,open,2026-06-01,2026-06-30,12,2500,0,Documentation review,Collect packet"
    }
  };

  const norm = s => String(s || "").toLowerCase().replace(/[^a-z0-9]/g, "");
  const read = (key, fallback) => { try { return JSON.parse(localStorage.getItem(key)) || fallback; } catch (e) { return fallback; } };
  const write = (key, value) => { try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {} };
  const esc = s => String(s == null ? "" : s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

  function parseCSV(text) {
    const rows = [];
    let row = [], cell = "", quoted = false;
    for (let i = 0; i < text.length; i++) {
      const ch = text[i], next = text[i + 1];
      if (ch === '"' && quoted && next === '"') { cell += '"'; i++; }
      else if (ch === '"') quoted = !quoted;
      else if (ch === "," && !quoted) { row.push(cell.trim()); cell = ""; }
      else if ((ch === "\n" || ch === "\r") && !quoted) {
        if (ch === "\r" && next === "\n") i++;
        row.push(cell.trim());
        if (row.some(v => v !== "")) rows.push(row);
        row = []; cell = "";
      } else cell += ch;
    }
    row.push(cell.trim());
    if (row.some(v => v !== "")) rows.push(row);
    return rows;
  }

  function toNumber(v, fallback = 0) {
    if (v == null || v === "") return fallback;
    const n = Number(String(v).replace(/[$,%]/g, ""));
    return Number.isFinite(n) ? n : fallback;
  }
  function toBool(v) {
    return ["true", "yes", "y", "1", "maintenance", "maint"].includes(norm(v));
  }
  function toList(v) {
    if (!v) return [];
    return String(v).split(/[;|]/).map(x => x.trim()).filter(Boolean);
  }
  function cleanStatus(v) {
    const s = norm(v);
    if (["intake", "verification", "pmpreview", "filling", "ready", "dispensed"].includes(s)) return s === "pmpreview" ? "pmp-review" : s;
    if (["sold", "complete", "completed"].includes(s)) return "dispensed";
    return v || "intake";
  }

  function mapRows(type, csvText) {
    const spec = TABLES[type];
    const matrix = parseCSV(csvText);
    if (matrix.length < 2) return { rows: [], errors: ["CSV needs a header row and at least one data row."], headers: [] };
    const headers = matrix[0];
    const lookup = {};
    headers.forEach((h, idx) => lookup[norm(h)] = idx);
    const fieldIndex = {};
    Object.entries(spec.fields).forEach(([field, aliases]) => {
      const hit = aliases.map(norm).find(a => lookup[a] != null);
      if (hit) fieldIndex[field] = lookup[hit];
    });
    const missing = spec.required.filter(f => fieldIndex[f] == null);
    const errors = missing.length ? [`Missing required field(s): ${missing.join(", ")}.`] : [];
    const rows = matrix.slice(1).map((raw, i) => cleanRow(type, raw, fieldIndex, i + 2)).filter(Boolean);
    const idSet = new Set();
    rows.forEach((r, i) => { if (r.id && idSet.has(r.id)) errors.push(`Duplicate id ${r.id} on cleaned row ${i + 1}.`); idSet.add(r.id); });
    return { rows, errors, headers };
  }

  function val(raw, index, field) { return index[field] == null ? "" : raw[index[field]]; }
  function cleanRow(type, raw, index, rowNum) {
    if (type === "patients") return {
      id: val(raw, index, "id") || `P-UP-${rowNum}`,
      first: val(raw, index, "first") || "Unknown",
      last: val(raw, index, "last") || "Patient",
      dob: val(raw, index, "dob"), sex: val(raw, index, "sex"), phone: val(raw, index, "phone"),
      insurance: val(raw, index, "insurance"), allergies: toList(val(raw, index, "allergies")), conditions: toList(val(raw, index, "conditions")), notes: val(raw, index, "notes")
    };
    if (type === "inventory") return {
      id: val(raw, index, "id") || `D-UP-${rowNum}`, name: val(raw, index, "name") || "Unknown item", strength: val(raw, index, "strength"), form: val(raw, index, "form"), ndc: val(raw, index, "ndc"), class: val(raw, index, "class"),
      stock: toNumber(val(raw, index, "stock")), reorder: toNumber(val(raw, index, "reorder")), cost: toNumber(val(raw, index, "cost")), price: toNumber(val(raw, index, "price")), expReimb: toNumber(val(raw, index, "expReimb")), dirRate: toNumber(val(raw, index, "dirRate")), expiry: val(raw, index, "expiry"), schedule: toNumber(val(raw, index, "schedule"))
    };
    if (type === "prescriptions") return {
      id: val(raw, index, "id") || `RX-UP-${rowNum}`, patientId: val(raw, index, "patientId"), drugId: val(raw, index, "drugId"), sig: val(raw, index, "sig"), qty: toNumber(val(raw, index, "qty")), daysSupply: toNumber(val(raw, index, "daysSupply")), refills: toNumber(val(raw, index, "refills")), prescriber: val(raw, index, "prescriber"), written: val(raw, index, "written"), status: cleanStatus(val(raw, index, "status")), dispensedOn: val(raw, index, "dispensedOn"), maintenance: toBool(val(raw, index, "maintenance")), pdc: toNumber(val(raw, index, "pdc"), null)
    };
    if (type === "claims") return {
      id: val(raw, index, "id") || `CLM-UP-${rowNum}`, rxId: val(raw, index, "rxId"), payer: val(raw, index, "payer") || "Unknown payer", bin: val(raw, index, "bin"), pcn: val(raw, index, "pcn"), billed: toNumber(val(raw, index, "billed")), paid: toNumber(val(raw, index, "paid")), copay: toNumber(val(raw, index, "copay")), status: val(raw, index, "status") || "paid", rejectCode: val(raw, index, "rejectCode"), dirFee: toNumber(val(raw, index, "dirFee")), appealStatus: val(raw, index, "appealStatus") || "none", recovered: toNumber(val(raw, index, "recovered"))
    };
    if (type === "audits") return {
      id: val(raw, index, "id") || `AUD-UP-${rowNum}`, pbm: val(raw, index, "pbm") || "Unknown PBM", type: val(raw, index, "type"), status: val(raw, index, "status") || "open", started: val(raw, index, "started"), due: val(raw, index, "due"), claims: toNumber(val(raw, index, "claims")), amountAtRisk: toNumber(val(raw, index, "amountAtRisk")), recouped: toNumber(val(raw, index, "recouped")), reason: val(raw, index, "reason"), action: val(raw, index, "action")
    };
  }

  function stage(type, parsed, fileName) {
    const all = read(STAGE_KEY, {});
    all[type] = { type, fileName, importedAt: new Date().toISOString(), rows: parsed.rows, errors: parsed.errors, headers: parsed.headers };
    write(STAGE_KEY, all);
  }
  function staged() { return read(STAGE_KEY, {}); }
  function history() { return read(HISTORY_KEY, []); }

  function templateDownload(type) {
    downloadFile(`pharmadesk-${type}-template.csv`, TABLES[type].template, "text/csv");
    toast(`${TABLES[type].label} template downloaded`);
  }
  function handleFile(type, input) {
    const file = input.files && input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const parsed = mapRows(type, String(reader.result || ""));
      stage(type, parsed, file.name);
      toast(parsed.errors.length ? `${TABLES[type].label}: staged with warnings` : `${TABLES[type].label}: staged successfully`);
      render();
      navigate("importcenter");
    };
    reader.readAsText(file);
  }

  function integrate() {
    const s = staged();
    const types = Object.keys(s).filter(t => TABLES[t] && s[t].rows && s[t].rows.length && !s[t].errors.length);
    if (!types.length) { toast("No clean staged files to integrate"); return; }
    types.forEach(t => { Store.all[t] = s[t].rows; });
    Store.all.meta = Store.all.meta || {};
    Store.all.meta.lastCsvImport = { date: new Date().toISOString(), tables: types };
    Store.commit();
    const h = history();
    h.unshift({ date: new Date().toISOString(), tables: types, counts: Object.fromEntries(types.map(t => [t, s[t].rows.length])) });
    write(HISTORY_KEY, h.slice(0, 10));
    localStorage.removeItem(STAGE_KEY);
    toast(`Integrated ${types.length} CSV section(s)`);
    render();
    navigate("dashboard");
  }
  function clearStage() { localStorage.removeItem(STAGE_KEY); toast("Import staging cleared"); render(); }

  function addNav() {

    btn.onclick = () => navigate("importcenter");
  }

  Views.importcenter = () => {
    const s = staged();
    const h = history();
    const clean = Object.values(s).filter(x => x.rows?.length && !x.errors?.length).length;
    const blocked = Object.values(s).filter(x => x.errors?.length).length;
    return `<div class="ops-hero"><h2>CSV Import Center</h2><p>Demo-only workflow for importing pharmacy CSV sections into staging, cleaning/mapping fields, previewing validation, and integrating clean sections into the app data.</p><div class="ops-banner"><b>Demo warning:</b> do not upload real PHI, real patient identifiers, or real claim files into this public/static demo.</div></div>

      <div class="ops-grid">${Object.entries(TABLES).map(([type, spec]) => `<div class="ops-card"><div class="section-head"><h2>${spec.icon} ${spec.label}</h2><button class="btn sm" data-template="${type}">Template</button></div><p class="muted small">Required: ${spec.required.join(", ")}. Extra columns are ignored; common column names are mapped automatically.</p><input class="file-input" type="file" accept=".csv,text/csv" data-import-file="${type}">${s[type] ? `<div class="note-item" style="margin-top:10px"><b>${esc(s[type].fileName)}</b><div>${s[type].rows.length} cleaned row(s)</div>${s[type].errors.length ? `<div class="badge red">${s[type].errors.length} issue(s)</div>` : `<div class="badge green">Ready to integrate</div>`}</div>` : `<div class="muted small">No file staged.</div>`}</div>`).join("")}</div>
      <div class="ops-card" style="margin-top:16px"><div class="section-head"><h2>Staging review</h2><div class="row"><button class="btn" id="clearImportStage">Clear staging</button><button class="btn primary" id="integrateImports">Integrate clean files</button></div></div>${Object.entries(s).length ? Object.entries(s).map(([type, item]) => `<div class="queue-row"><span class="priority-dot ${item.errors.length ? "red" : "green"}"></span><div><b>${TABLES[type]?.label || type}</b><span class="action-note">${item.rows.length} row(s) · ${esc(item.fileName)}</span>${item.errors.map(e => `<span class="action-note" style="color:var(--danger)">${esc(e)}</span>`).join("")}</div><span class="badge ${item.errors.length ? "red" : "green"}">${item.errors.length ? "blocked" : "ready"}</span></div>`).join("") : `<div class="empty">No staged files. Upload a CSV above to start the cleaning workflow.</div>`}</div>
      <div class="ops-card" style="margin-top:16px"><div class="section-head"><h2>Recent local imports</h2></div>${h.length ? h.map(x => `<div class="note-item"><b>${new Date(x.date).toLocaleString()}</b><div>${x.tables.join(", ")} · ${Object.entries(x.counts).map(([k,v]) => `${k}:${v}`).join(" · ")}</div></div>`).join("") : `<div class="empty">No integration history yet.</div>`}</div>`;
  };

  const baseDash = Views.dashboard;
  Views.dashboard = () => `${baseDash()}<div class="ops-card" style="margin-top:16px"><div class="section-head"><h2>CSV import workflow</h2><span class="badge blue">demo data pipeline</span></div><p class="muted">Use Import Center to upload CSV sections, stage/clean them, then integrate successful files into the app data model.</p><button class="btn primary" data-go="importcenter">Open Import Center</button></div>`;

  const baseRender = render;
  render = function () {
    const result = baseRender.apply(this, arguments);
    addNav();
    document.querySelectorAll("[data-import-file]").forEach(input => input.onchange = () => handleFile(input.dataset.importFile, input));
    document.querySelectorAll("[data-template]").forEach(btn => btn.onclick = () => templateDownload(btn.dataset.template));
    const integrateBtn = document.getElementById("integrateImports"); if (integrateBtn) integrateBtn.onclick = integrate;
    const clearBtn = document.getElementById("clearImportStage"); if (clearBtn) clearBtn.onclick = clearStage;
    return result;
  };

  try { addNav(); render(); } catch (e) { console.error("Import Center failed", e); }
})();

    { view: "reportcenter", label: "Report center", desc: "Exportable report library." }
  ];

  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }
  function dollars(n) {
    const v = Number(n) || 0;
    return (v < 0 ? "−" : "") + money(Math.abs(v));
  }
  function safeEco(c) {
    try { return claimEconomics(c); }
    catch (e) {
      const rx = Store.prescriptions.find(r => r.id === c.rxId);
      const drug = rx ? Store.findDrug(rx.drugId) : null;
      const reimbursement = (c.paid || 0) + (c.copay || 0);
      const acquisitionCost = drug && rx ? drug.cost * rx.qty : 0;
      const dirFee = c.dirFee || 0;
      const net = reimbursement - acquisitionCost - dirFee + (c.recovered || 0);
      return { rx, drug, reimbursement, acquisitionCost, dirFee, net, underwater: net < 0, macEligible: reimbursement < acquisitionCost };
    }
  }
  function riskBadge(label, tone) {
    return `<span class="badge ${tone || "gray"}">${esc(label)}</span>`;
  }
  function sectionCard(title, body, view, tone) {
    return `<div class="ops-card simplified-card ${tone || ""}"><div class="section-head"><h3>${esc(title)}</h3>${view ? `<button class="btn sm" data-go="${view}">Open</button>` : ""}</div><p class="muted">${esc(body)}</p></div>`;
  }

  function openTasks() {
    const done = readDoneTasks();
    const items = (typeof window !== "undefined" && typeof window.taskItems === "function")
      ? window.taskItems()
      : (typeof taskItems === "function" ? taskItems() : []);
    return items.filter(t => !done.includes(t.id));
  }
  function readDoneTasks() {
    try { return JSON.parse(localStorage.getItem("pharmadesk.v3.doneTasks")) || []; }
    catch (e) { return []; }
  }
  function rejectedClaims() {
    return Store.claims.filter(c => c.status === "rejected");
  }
  function underwaterClaims() {
    return Store.claims.map(c => ({ c, e: safeEco(c) })).filter(x => x.e.underwater);
  }
  function clinicalHoldRows() {
    return Store.prescriptions.filter(r => ["intake", "verification", "pmp-review"].includes(r.status)).map(r => {
      const p = Store.findPatient(r.patientId);
      const d = Store.findDrug(r.drugId);
      const allergy = allergyConflict(p, d);
      const interactions = checkInteractions(patientActiveDrugs(p.id));
      const needs = Boolean(allergy || interactions.length || d.schedule > 0 || r.status === "pmp-review");
      return { r, p, d, allergy, interactions, needs };
    }).filter(x => x.needs).slice(0, 6);
  }
  function reorderRows() {
    return Store.inventory.map(d => {
      let pe;
      try { pe = projectedEconomics(d, 1); }
      catch (e) { pe = { net: (d.expReimb || 0) - (d.cost || 0) - ((d.expReimb || 0) * (d.dirRate || 0)) }; }
      const exp = daysUntil(d.expiry);
      let rec = "Monitor", tone = "gray";
      if (exp <= 45) { rec = "Return"; tone = "red"; }
      else if (d.stock <= d.reorder && pe.net < 0) { rec = "Hold"; tone = "amber"; }
      else if (d.stock <= d.reorder) { rec = "Buy"; tone = "green"; }
      else if (pe.net < 0) { rec = "Substitute"; tone = "amber"; }
      return { d, pe, exp, rec, tone };
    }).filter(x => x.rec !== "Monitor").slice(0, 8);
  }
  function patientRows() {
    return Store.patients.map(p => {
      const rxs = Store.prescriptions.filter(r => r.patientId === p.id);
      const maintenance = rxs.filter(r => r.maintenance);
      const pdc = maintenance.map(r => r.pdc).filter(Boolean);
      const avg = pdc.length ? Math.round((pdc.reduce((a, b) => a + b, 0) / pdc.length) * 100) : null;
      let status = avg != null && avg < 80 ? "Follow up" : maintenance.length >= 2 ? "Sync candidate" : "Monitor";
      let tone = status === "Follow up" ? "red" : status === "Sync candidate" ? "blue" : "green";
      return { p, rxs, maintenance, avg, status, tone };
    }).sort((a, b) => (a.status === "Follow up" ? -1 : b.status === "Follow up" ? 1 : b.rxs.length - a.rxs.length)).slice(0, 8);
  }

  function simpleTaskList(limit) {

    return `<div class="simple-list">${tasks.map(t => `<div class="simple-row"><span class="priority-dot ${t.priority || "amber"}"></span><div><b>${esc(t.title)}</b><p>${esc(t.detail || "")}</p><small>${esc(t.next || "")}</small></div><button class="btn sm" data-go="${t.view || "workqueue"}">Open</button></div>`).join("")}</div>`;
  }

  const originalDashboard = Views.dashboard;
  Views.dashboard = () => {

      ${kpiStrip()}
      <div class="simple-layout"><section class="ops-card"><div class="section-head"><h2>Do first</h2><button class="btn sm" data-go="workqueue">Full queue</button></div>${simpleTaskList(6)}</section><aside class="ops-card"><h2>Owner brief</h2><p class="muted">Start with clinical holds. Work rejected and underwater claims. Order only what makes economic sense. Finish with close and audit checks.</p><div class="chip-row">${riskBadge("Clinical first", "red")}${riskBadge("Payer loss", "amber")}${riskBadge("Inventory", "blue")}${riskBadge("Close", "green")}</div></aside></div>`;

  Views.dispensinghub = () => {

    return `<div class="simple-hero"><div><h2>Dispensing</h2><p>Verify, document, and move prescriptions forward without jumping between queue screens.</p></div><button class="btn" data-go="clinicalops">Detailed review</button></div>
      <div class="simple-layout"><section class="ops-card"><div class="section-head"><h2>Needs pharmacist review</h2>${riskBadge(`${holds.length} hold(s)`, holds.length ? "red" : "green")}</div>${holds.length ? `<div class="simple-list">${holds.map(x => `<div class="simple-row"><span class="priority-dot red"></span><div><b>${esc(x.r.id)} · ${esc(x.p.first)} ${esc(x.p.last)}</b><p>${esc(x.d.name)} ${esc(x.d.strength)}</p><small>${x.allergy ? "Allergy conflict" : x.interactions.length ? `${x.interactions.length} interaction finding(s)` : x.d.schedule ? `Controlled schedule C-${x.d.schedule}` : "Review required"}</small></div><button class="btn sm" data-go="clinicalops">Review</button></div>`).join("")}</div>` : `<div class="empty">No clinical holds.</div>`}</section>

  Views.patienthub = () => {
    const rows = patientRows();
    return `<div class="simple-hero"><div><h2>Patients</h2><p>Focus on the patients who need adherence, sync, or follow-up work today.</p></div><button class="btn" data-go="careplans">All care notes</button></div>
      <div class="ops-grid-3 simple-patient-grid">${rows.map(x => `<div class="ops-card"><div class="section-head"><h3>${esc(x.p.first)} ${esc(x.p.last)}</h3>${riskBadge(x.status, x.tone)}</div><p class="muted">${esc(x.p.insurance || "No plan listed")}</p><div class="chip-row">${riskBadge(`${x.rxs.length} active`, "blue")}${x.avg != null ? riskBadge(`PDC ${x.avg}%`, x.avg < 80 ? "red" : "green") : riskBadge("PDC n/a", "gray")}${x.maintenance.length >= 2 ? riskBadge("Med sync", "blue") : ""}</div><button class="btn sm" data-go="careplans">Open care view</button></div>`).join("")}</div>`;
  };

  Views.inventoryhub = () => {
    const rows = reorderRows();

      <div class="ops-card" style="margin-top:16px"><div class="section-head"><h2>Detailed views</h2></div><div class="ops-grid-3">${LEGACY_LINKS.map(x => `<button class="tool-link" data-go="${x.view}"><b>${esc(x.label)}</b><span>${esc(x.desc)}</span></button>`).join("")}</div></div>`;

  function injectStyles() {
    if (document.getElementById("streamlineStyles")) return;

    style.id = "streamlineStyles";

      body.streamlined .muted-nav { display:none !important; }

      .simple-kpi b { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.06em; }
      .simple-layout { display:grid; grid-template-columns:minmax(0,2fr) minmax(280px,1fr); gap:16px; }
      .simple-list { display:flex; flex-direction:column; gap:10px; }
      .simple-list.compact { gap:8px; }
      .simple-row { display:grid; grid-template-columns:auto 1fr auto; gap:12px; align-items:center; border:1px solid var(--line); border-radius:14px; padding:12px; background:#fff; }
      .simple-row p { margin:3px 0; color:var(--muted); }
      .simple-row small { color:var(--muted); }
      .simplified-card h3 { margin:0; }
      .tool-link { display:flex; flex-direction:column; gap:6px; text-align:left; background:#fff; border:1px solid var(--line); border-radius:14px; padding:14px; cursor:pointer; color:var(--ink); }
      .tool-link span { color:var(--muted); font-size:12px; line-height:1.4; }
      body.view-mobile .simple-hero { flex-direction:column; align-items:flex-start; padding:16px; border-radius:16px; }
      body.view-mobile .simple-hero h2 { font-size:22px; }
      body.view-mobile .simple-kpis { grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; }
      body.view-mobile .simple-layout { grid-template-columns:1fr; }
      body.view-mobile .simple-row { grid-template-columns:auto 1fr; }
      body.view-mobile .simple-row .btn { grid-column:2; width:max-content; }
    `;
    document.head.appendChild(style);
  }

  function installNav() {
    const nav = document.getElementById("nav");
    if (!nav) return;
    const current = window.currentView || "dashboard";
    nav.innerHTML = PRIMARY_NAV.map(x => `<button class="nav-item ${x.view === current ? "active" : ""}" data-view="${x.view}"><span class="ni-ico">${x.icon}</span> ${x.label}</button>`).join("");
    nav.querySelectorAll(".nav-item").forEach(btn => btn.onclick = () => navigate(btn.dataset.view));
  }

  function updateTitle() {
    const h = document.getElementById("viewTitle");
    if (!h) return;
    const found = PRIMARY_NAV.find(x => x.view === (window.currentView || "dashboard"));
    if (found) h.textContent = `${found.icon} ${found.label}`;
  }

  function installTour() {
    if (window.__pharmadeskStreamlinedTourInstalled) return;
    window.__pharmadeskStreamlinedTourInstalled = true;
    window.__pharmadeskTourSteps = [
      { view: "dashboard", title: "Home", body: "Start here. The app now focuses on one operating view: open tasks, clinical holds, claims risk, inventory actions, and the owner brief." },
      { view: "dispensinghub", title: "Dispensing", body: "Dispensing combines the queue and clinical review into one practical workflow: verify, document, then move the prescription forward." },
      { view: "patienthub", title: "Patients", body: "Patients combines care notes and Med Sync so adherence and follow-up live in one patient-centered area." },
      { view: "inventoryhub", title: "Inventory", body: "Inventory combines stock and purchasing decisions. The question is simple: buy, hold, return, or substitute." },

  }

  const baseRender = render;
  render = function () {
    const result = baseRender.apply(this, arguments);
    document.body.classList.add("streamlined");
    injectStyles();
    installNav();
    updateTitle();
    installTour();
    return result;
  };

  try {
    document.body.classList.add("streamlined");
    injectStyles();
    installNav();
    installTour();
    render();
  } catch (e) {
    console.error("Streamline layer failed", e);
  }
})();

/* Final deterministic router. Loaded last. */
(function () {
  // Theme-colored wrench (inherits the nav text color via currentColor).
  const WRENCH = '<svg class="ni-svg" viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>';
  const nav = [
    ["dashboard", "⌂", "Home"], ["dispensinghub", "℞", "Dispense"],
    ["patienthub", "◉", "Patients"], ["inventoryhub", "□", "Inventory"],
    ["pbmhub", "$", "PBM"], ["toolshub", WRENCH, "Tools"]
  ];
  const group = {
    dashboard:"dashboard", workqueue:"dashboard",
    dispensinghub:"dispensinghub", prescriptions:"dispensinghub", clinicalops:"dispensinghub",
    patienthub:"patienthub", patients:"patienthub", careplans:"patienthub", medsync:"patienthub",
    inventoryhub:"inventoryhub", inventory:"inventoryhub", purchasing:"inventoryhub",
    pbmhub:"pbmhub", reimbursement:"pbmhub", claimsops:"pbmhub",
    toolshub:"toolshub", reportcenter:"toolshub", importcenter:"toolshub", dailyclose:"toolshub", auditdefense:"toolshub", sop:"toolshub", audits:"toolshub", compliance:"toolshub"
  };
  const fallback = { dispensinghub:"prescriptions", patienthub:"patients", inventoryhub:"inventory", pbmhub:"reimbursement", toolshub:"reportcenter" };
  const tour = [
    ["dashboard", "Home", "Daily priorities, risk counts, and owner brief."],
    ["dispensinghub", "Dispensing", "Prescription queue and pharmacist review in one workflow."],
    ["patienthub", "Patients", "Adherence, Med Sync, follow-up, and patient relationship work."],
    ["inventoryhub", "Inventory", "Stock and purchasing decisions: buy, hold, return, or substitute."],
    ["pbmhub", "PBM", "Reimbursement, DIR fees, PBM networks, audits, and appeals."],
    ["toolshub", "Tools", "CSV upload, reports, daily close, SOPs, and audit packets."]
  ];
  const esc = s => String(s || "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  const hasViews = () => typeof Views !== "undefined";
  const primary = v => group[v || window.__pdView || "dashboard"] || "dashboard";
  const actual = v => hasViews() && Views[v] ? v : hasViews() && fallback[v] && Views[fallback[v]] ? fallback[v] : v;
  const label = v => nav.find(x => x[0] === primary(v)) || nav[0];

  // Capture the full render pipeline (streamline → import-center → view-mode →
  // operator-upgrades → v3 → base) BEFORE we install our own router, so that
  // navigating re-runs every layer's view wiring instead of bypassing it.
  const pipelineRender = (typeof window.render === "function") ? window.render : null;
  function clearModal() { const m = document.getElementById("modalRoot"); if (m) m.innerHTML = ""; }

  function drawNav(activeView) {
    const el = document.getElementById("nav");
    if (!el) return;
    const active = primary(activeView);
    el.innerHTML = nav.map(([view, ico, text]) => `<button class="nav-item ${view === active ? "active" : ""}" data-view="${view}"><span class="ni-ico">${ico}</span> ${text}</button>`).join("");
  }

  function show(view) {
    const requested = view || "dashboard";
    const target = actual(requested);
    if (!hasViews() || !Views[target]) return false;
    const root = document.getElementById("view");
    if (!root) return false;
    window.__pdView = requested;
    window.__pharmadeskCurrentView = requested;
    // render the view that actually exists so the pipeline never throws
    try { currentView = target; } catch (e) { try { window.currentView = target; } catch (e2) {} }
    clearModal(); // never let a leftover modal/backdrop trap taps (esp. mobile nav)
    // Run the full render pipeline so every layer re-wires its buttons.
    if (pipelineRender) {
      try { pipelineRender(); }
      catch (e) {
        console.error("pipeline render failed, using fallback", e);
        root.innerHTML = Views[target]();
        if (typeof wireView === "function") wireView();
        if (typeof animateCounts === "function") animateCounts(root);
      }
    } else {
      root.innerHTML = Views[target]();
      if (typeof wireView === "function") wireView();
      if (typeof animateCounts === "function") animateCounts(root);
    }
    // Own the primary bottom nav + title so they stay consistent across views.
    drawNav(requested);
    const l = label(requested);
    const title = document.getElementById("viewTitle");
    if (title) title.textContent = `${l[1]} ${l[2]}`;
    window.scrollTo({ top: 0, behavior: "smooth" });

  }

  function runTour(idx) {
    const i = Math.max(0, Math.min(idx || 0, tour.length - 1));
    const [view, title, body] = tour[i];
    show(view);
    const root = document.getElementById("modalRoot");
    if (!root) return;
    root.innerHTML = `<div id="frBg" style="position:fixed;inset:0;background:rgba(10,16,22,.48);z-index:500"></div><div class="tour-step" role="dialog" aria-modal="true" style="position:fixed;left:14px;right:14px;bottom:calc(104px + env(safe-area-inset-bottom,0px));background:var(--ux-panel,#fff);color:var(--ux-ink,#101418);border:1px solid var(--ux-line,#d8dee4);border-radius:20px;box-shadow:0 20px 70px rgba(0,0,0,.28);z-index:501;padding:18px"><div style="color:var(--ux-muted,#69737d);font-size:11px;text-transform:uppercase;letter-spacing:.08em;font-weight:900;margin-bottom:8px">Step ${i + 1} of ${tour.length}</div><h3 style="font-size:20px;margin:0 0 8px;letter-spacing:-.03em">${esc(title)}</h3><p style="color:var(--ux-muted,#69737d);line-height:1.55;margin:0 0 16px">${esc(body)}</p><div class="row" style="justify-content:flex-end;gap:8px;flex-wrap:wrap"><button class="btn" id="frEnd">End</button><button class="btn" id="frBack" ${i === 0 ? "disabled" : ""}>Back</button><button class="btn primary" id="frNext">${i === tour.length - 1 ? "Finish" : "Next"}</button></div></div>`;

    document.getElementById("frEnd").onclick = () => root.innerHTML = "";

  }

  function onClick(e) {
    const tourBtn = e.target.closest && e.target.closest("#startTour");
    if (tourBtn) { e.preventDefault(); e.stopImmediatePropagation(); runTour(0); return; }
    const navBtn = e.target.closest && e.target.closest(".nav-item[data-view]");
    if (navBtn) { e.preventDefault(); e.stopImmediatePropagation(); show(navBtn.dataset.view); return; }
    const routeBtn = e.target.closest && e.target.closest("[data-go]");
    if (routeBtn && show(routeBtn.dataset.go)) { e.preventDefault(); e.stopImmediatePropagation(); }
  }

    window.__pharmadeskShow = show;
    window.__pharmadeskTour = runTour;
    drawNav(window.__pdView || "dashboard");
  }
  boot(0);
})();

   ============================================================ */
(function () {
  const esc = s => String(s == null ? "" : s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  const has = fn => typeof fn === "function";
  const go = view => { if (has(window.navigate)) window.navigate(view); };
  const clickById = id => { const b = document.getElementById(id); if (b) b.click(); };

  // Pages reachable through the operator router (hubs + the deeper views).
  const PAGES = [
    ["dashboard", "Home", "Today’s operating view"],
    ["dispensinghub", "Dispense", "Queue & clinical review"],
    ["patienthub", "Patients", "Adherence, sync, follow-up"],
    ["inventoryhub", "Inventory", "Buy / hold / return / substitute"],
    ["pbmhub", "PBM", "Reimbursement, DIR, appeals"],
    ["toolshub", "Tools", "Reports, import, close, SOP"],
    ["workqueue", "Full work queue", "All open exceptions"],
    ["clinicalops", "Clinical review detail", "Review & note capture"],
    ["claimsops", "Claims desk", "Payer follow-up lifecycle"],
    ["purchasing", "Purchasing detail", "Full reorder table"],
    ["careplans", "Patient care detail", "Care notes & adherence"],
    ["medsync", "Med Sync", "Maintenance-med sync"],
    ["dailyclose", "Daily close", "End-of-day checklist & packet"],
    ["auditdefense", "Audit defense", "Audit response packet"],
    ["importcenter", "CSV Import Center", "Upload, clean, integrate"],
    ["reportcenter", "Report center", "Exportable reports"],
    ["reimbursement", "Reimbursement detail", "Per-claim economics"],
    ["controlled", "Controlled log", "C-II–C-V register"],
    ["immunizations", "Immunizations", "Vaccine records"],
    ["compliance", "Compliance", "Licenses & renewals"],
    ["sop", "SOP guide", "Workflow training cards"]
  ];

  function buildIndex() {
    const items = [];
    PAGES.forEach(([view, title, sub]) => items.push({ group: "Pages", icon: "→", title, sub, run: () => go(view) }));

    items.push(
      { group: "Actions", icon: "+", title: "New prescription", sub: "Add an Rx to the queue", run: () => { go("dispensinghub"); if (has(window.newRxForm)) newRxForm(); } },
      { group: "Actions", icon: "+", title: "Record immunization", sub: "Log a vaccine", run: () => { go("immunizations"); if (has(window.newImmForm)) newImmForm(); } },
      { group: "Actions", icon: "?", title: "Take a tour", sub: "Guided walkthrough", run: () => clickById("startTour") },
      { group: "Actions", icon: "⎙", title: "Print brief", sub: "Owner brief print view", run: () => clickById("printBrief") },
      { group: "Actions", icon: "↺", title: "Reset demo data", sub: "Restore the original dataset", run: () => clickById("resetData") }
    );

    try {
      Store.patients.forEach(p => items.push({ group: "Patients", icon: "◉", title: `${p.first} ${p.last}`,
        sub: `${p.id} · ${typeof age === "function" ? age(p.dob) + " y/o · " : ""}${p.insurance || "No plan"}`,
        run: () => { if (has(window.patientChart)) patientChart(p.id); else go("patienthub"); } }));
      Store.inventory.forEach(d => items.push({ group: "Drugs", icon: "℞", title: `${d.name} ${d.strength}`,
        sub: `${d.class} · NDC ${d.ndc}${d.schedule ? " · C-" + d.schedule : ""}`,
        run: () => { if (has(window.drugDetail)) drugDetail(d.id); else go("inventoryhub"); } }));
      Store.prescriptions.forEach(r => { const p = Store.findPatient(r.patientId), d = Store.findDrug(r.drugId);
        items.push({ group: "Prescriptions", icon: "℞", title: `${r.id} — ${d ? d.name : ""}`,
          sub: `${p ? p.first + " " + p.last : ""} · ${r.status}`,
          run: () => { if (has(window.rxDetails)) rxDetails(r.id); else go("dispensinghub"); } }); });
      Store.claims.forEach(c => items.push({ group: "Claims", icon: "$", title: `${c.id} — ${c.payer}`,
        sub: `${c.status}${c.rejectCode ? " · " + c.rejectCode : ""}`,
        run: () => { if (has(window.claimDetail)) claimDetail(c.id); else go("pbmhub"); } }));
      (Store.audits || []).forEach(a => items.push({ group: "Audits", icon: "▣", title: `${a.id} — ${a.pbm}`,
        sub: `${a.type} · ${a.status}`, run: () => { if (has(window.auditDetail)) auditDetail(a.id); else go("auditdefense"); } }));
      (Store.credentials || []).forEach(c => items.push({ group: "Compliance", icon: "▤", title: c.name,
        sub: `${c.authority} · expires ${typeof fmtDate === "function" ? fmtDate(c.expires) : c.expires}`,
        run: () => { if (has(window.credentialDetail)) credentialDetail(c.id); else go("compliance"); } }));
    } catch (e) { /* data not ready — pages + actions still work */ }
    return items;
  }

  function score(it, terms) {
    const t = it.title.toLowerCase(), s = (it.sub || "").toLowerCase();
    let sc = 0;
    for (const q of terms) {
      if (t.startsWith(q)) sc += 100;
      else if (t.includes(q)) sc += 50;
      else if (s.includes(q)) sc += 20;
      else return -1;
    }
    return sc;
  }
  function mark(text, terms) {
    let out = esc(text);
    const q = [...terms].sort((a, b) => b.length - a.length)[0];
    if (q) { const i = out.toLowerCase().indexOf(q); if (i >= 0) out = out.slice(0, i) + '<span class="cmd-mark">' + out.slice(i, i + q.length) + "</span>" + out.slice(i + q.length); }
    return out;
  }

  let state = null;
  function openPalette() {
    if (state) return;
    const root = document.getElementById("paletteRoot") || (() => { const d = document.createElement("div"); d.id = "paletteRoot"; document.body.appendChild(d); return d; })();
    const last = document.activeElement;
    const index = buildIndex();
    root.innerHTML =
      '<div class="cmd-backdrop" id="cmdBackdrop"><div class="cmd" role="dialog" aria-modal="true" aria-label="Command palette">' +
      '<div class="cmd-search"><span class="cmd-search-ico" aria-hidden="true">⌕</span>' +
      '<input id="cmdInput" type="text" placeholder="Search pages, patients, drugs, Rx, claims…" autocomplete="off" spellcheck="false" role="combobox" aria-expanded="true" aria-controls="cmdResults" aria-autocomplete="list" /></div>' +
      '<div class="cmd-results" id="cmdResults" role="listbox"></div>' +
      '<div class="cmd-foot"><span><kbd>↑</kbd><kbd>↓</kbd> move</span><span><kbd>↵</kbd> open</span><span><kbd>esc</kbd> close</span></div>' +
      "</div></div>";
    const input = document.getElementById("cmdInput"), results = document.getElementById("cmdResults");
    let filtered = [], sel = 0;

    const close = () => { root.innerHTML = ""; state = null; document.removeEventListener("keydown", onKey, true); if (last && last.focus) last.focus(); };
    const update = () => {
      const q = input.value.trim().toLowerCase(), terms = q ? q.split(/\s+/) : [];
      filtered = !terms.length
        ? index.filter(i => i.group === "Pages" || i.group === "Actions")
        : index.map(i => ({ i, s: score(i, terms) })).filter(x => x.s >= 0).sort((a, b) => b.s - a.s).slice(0, 40).map(x => x.i);
      sel = 0; draw(terms);
    };
    const draw = terms => {
      if (!filtered.length) { results.innerHTML = '<div class="cmd-empty">No matches for “' + esc(input.value) + '”.</div>'; return; }
      let html = "", g = null;
      filtered.forEach((it, i) => {
        if (it.group !== g) { html += '<div class="cmd-group">' + esc(it.group) + "</div>"; g = it.group; }
        html += '<div class="cmd-item" role="option" id="cmd-' + i + '" data-i="' + i + '" aria-selected="' + (i === sel) + '">' +
          '<span class="cmd-ico">' + it.icon + "</span><span class=\"cmd-text\"><span class=\"cmd-title\">" + mark(it.title, terms) + "</span>" +
          (it.sub ? '<span class="cmd-sub">' + mark(it.sub, terms) + "</span>" : "") + '</span><span class="cmd-hint">↵</span></div>';
      });
      results.innerHTML = html;
      results.querySelectorAll(".cmd-item").forEach(el => { el.onmouseenter = () => setSel(+el.dataset.i); el.onclick = () => run(+el.dataset.i); });
      into();
    };
    const setSel = i => { sel = i; results.querySelectorAll(".cmd-item").forEach(el => el.setAttribute("aria-selected", +el.dataset.i === sel)); into(); };
    const into = () => { const el = document.getElementById("cmd-" + sel); if (el) el.scrollIntoView({ block: "nearest" }); };
    const run = i => { const it = filtered[i]; if (!it) return; close(); try { it.run(); } catch (e) { console.error("command failed", e); } };
    const onKey = e => {
      if (e.key === "Escape") { e.preventDefault(); e.stopPropagation(); close(); }
      else if (e.key === "ArrowDown") { e.preventDefault(); if (filtered.length) setSel((sel + 1) % filtered.length); }
      else if (e.key === "ArrowUp") { e.preventDefault(); if (filtered.length) setSel((sel - 1 + filtered.length) % filtered.length); }
      else if (e.key === "Enter") { e.preventDefault(); run(sel); }
    };

    document.addEventListener("keydown", onKey, true);
    input.addEventListener("input", update);
    document.getElementById("cmdBackdrop").onclick = e => { if (e.target.id === "cmdBackdrop") close(); };
    state = { close };
    update();
    setTimeout(() => input.focus(), 0);
  }
  window.__pharmadeskPalette = openPalette;

  function wire() {
    // global shortcuts
    document.addEventListener("keydown", e => {
      if ((e.metaKey || e.ctrlKey) && (e.key === "k" || e.key === "K")) { e.preventDefault(); openPalette(); return; }
      const typing = /^(INPUT|TEXTAREA|SELECT)$/.test((e.target && e.target.tagName) || "");
      if (e.key === "/" && !typing && !state) { e.preventDefault(); openPalette(); }
    });
    // repurpose the top-bar search as the (mobile-friendly) palette trigger
    const search = document.getElementById("globalSearch");
    if (search) {
      search.readOnly = true;
      search.setAttribute("aria-label", "Open command palette");
      search.placeholder = "Search…  ⌘K";
      const trigger = e => { e.preventDefault(); search.blur(); openPalette(); };
      search.addEventListener("focus", trigger);
      search.addEventListener("click", trigger);
    }
  }
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", wire);
  else wire();
})();

</script>
</body>
</html>
