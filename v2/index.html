<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PharmaDesk V2 — Independent Pharmacy Survival Simulator</title>
  <meta name="description" content="Enhanced PharmaDesk V2 demo with survival mode, PBM economics, appeals, and guided tour." />
  <meta name="theme-color" content="#0d7d6e" />
  <link rel="icon" href="../icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="../icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PharmaDesk V2" />
  <link rel="stylesheet" href="../css/styles.css" />
  <link rel="stylesheet" href="v2.css" />
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">℞</span>
        <div>
          <div class="brand-name">PharmaDesk <span class="badge green">V2</span></div>
          <div class="brand-sub">Survival Simulator</div>
        </div>
      </div>
      <nav class="nav" id="nav">
        <button class="nav-item active" data-view="dashboard"><span class="ni-ico">📊</span> Dashboard</button>
        <button class="nav-item v2-nav" data-view="survival"><span class="ni-ico">🧭</span> Survival Mode</button>
        <button class="nav-item v2-nav" data-view="explainer"><span class="ni-ico">💸</span> PBM / DIR Explainer</button>
        <button class="nav-item v2-nav" data-view="appeals"><span class="ni-ico">🧾</span> Appeals</button>
        <button class="nav-item v2-nav" data-view="mission"><span class="ni-ico">🏥</span> Mission</button>
        <button class="nav-item" data-view="prescriptions"><span class="ni-ico">℞</span> Dispensing Queue</button>
        <button class="nav-item" data-view="patients"><span class="ni-ico">👤</span> Patients</button>
        <button class="nav-item" data-view="inventory"><span class="ni-ico">📦</span> Inventory</button>
        <button class="nav-item" data-view="interactions"><span class="ni-ico">⚠️</span> Interaction Checker</button>
        <button class="nav-item" data-view="claims"><span class="ni-ico">💳</span> Claims &amp; Billing</button>
        <button class="nav-item" data-view="reimbursement"><span class="ni-ico">🔻</span> Reimbursement</button>
        <button class="nav-item" data-view="audits"><span class="ni-ico">📋</span> Audit Center</button>
        <button class="nav-item" data-view="compliance"><span class="ni-ico">📂</span> Compliance</button>
        <button class="nav-item" data-view="reportcenter"><span class="ni-ico">📦</span> Report Center</button>
        <button class="nav-item" data-view="refills"><span class="ni-ico">🔁</span> Refills &amp; Adherence</button>
        <button class="nav-item" data-view="controlled"><span class="ni-ico">🔒</span> Controlled Log</button>
        <button class="nav-item" data-view="immunizations"><span class="ni-ico">💉</span> Immunizations</button>
        <button class="nav-item" data-view="reports"><span class="ni-ico">📈</span> Business Reports</button>
      </nav>
      <div class="sidebar-foot">
        <button id="resetData" class="link-btn" title="Restore demo data">↺ Reset demo data</button>
        <div class="muted small">V2 demo · fictional data only</div>
        <div class="muted small"><a href="../" style="color:#9fd0c7">Compare with v1</a></div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <h1 id="viewTitle">Dashboard</h1>
        <div class="topbar-right">
          <button class="btn sm primary" id="startTour">Start demo tour</button>
          <input id="globalSearch" class="search" type="search" placeholder="Search patients, drugs, Rx…" />
          <div class="user-chip">
            <span class="avatar">KA</span>
            <div class="user-meta">
              <div class="user-name">K. Adeyemi, PharmD</div>
              <div class="muted small">Pharmacist-owner</div>
            </div>
          </div>
        </div>
      </header>
      <section id="view" class="view"></section>
    </main>
  </div>

  <div id="modalRoot"></div>
  <div id="toastRoot" class="toast-root"></div>

  <script src="../js/data.js"></script>
  <script src="../js/app.js"></script>
  <script src="v2.js"></script>
</body>
</html>
