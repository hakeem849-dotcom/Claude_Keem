<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PharmaDesk — Independent Pharmacy Manager</title>
  <meta name="description" content="Mock management app for an independent community pharmacy." />
  <meta name="theme-color" content="#0d7d6e" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PharmaDesk" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">℞</span>
        <div>
          <div class="brand-name">PharmaDesk</div>
          <div class="brand-sub">Independent Pharmacy</div>
        </div>
      </div>
      <nav class="nav" id="nav">
        <button class="nav-item active" data-view="dashboard"><span class="ni-ico">📊</span> Dashboard</button>
        <button class="nav-item" data-view="prescriptions"><span class="ni-ico">℞</span> Dispensing Queue</button>
        <button class="nav-item" data-view="patients"><span class="ni-ico">👤</span> Patients</button>
        <button class="nav-item" data-view="inventory"><span class="ni-ico">📦</span> Inventory</button>
        <button class="nav-item" data-view="interactions"><span class="ni-ico">⚠️</span> Interaction Checker</button>
        <button class="nav-item" data-view="claims"><span class="ni-ico">💳</span> Claims &amp; Billing</button>
        <button class="nav-item" data-view="reimbursement"><span class="ni-ico">💸</span> Reimbursement / PBM</button>
        <button class="nav-item" data-view="refills"><span class="ni-ico">🔁</span> Refills &amp; Adherence</button>
        <button class="nav-item" data-view="controlled"><span class="ni-ico">🔒</span> Controlled Log</button>
        <button class="nav-item" data-view="immunizations"><span class="ni-ico">💉</span> Immunizations</button>
        <button class="nav-item" data-view="audits"><span class="ni-ico">📋</span> Audit Center</button>
        <button class="nav-item" data-view="compliance"><span class="ni-ico">📂</span> Compliance</button>
        <button class="nav-item" data-view="reportcenter"><span class="ni-ico">🧾</span> Report Center</button>
        <button class="nav-item" data-view="reports"><span class="ni-ico">📈</span> Business Reports</button>
      </nav>
      <div class="sidebar-foot">
        <button id="resetData" class="link-btn" title="Restore demo data">↺ Reset demo data</button>
        <div class="muted small">Mock data · for demonstration only</div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="topbar">
        <h1 id="viewTitle">Dashboard</h1>
        <div class="topbar-right">
          <input id="globalSearch" class="search" type="search" placeholder="Search patients, drugs, Rx…" />
          <div class="user-chip">
            <span class="avatar">KA</span>
            <div class="user-meta">
              <div class="user-name">K. Adeyemi, PharmD</div>
              <div class="muted small">Pharmacist in charge</div>
            </div>
          </div>
        </div>
      </header>
      <section id="view" class="view"></section>
    </main>
  </div>

  <!-- Modal host -->
  <div id="modalRoot"></div>
  <div id="toastRoot" class="toast-root"></div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Register service worker for offline / installable PWA (only over http/https)
    if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
      window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
    }
  </script>
</body>
</html>
