<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <!-- Noir is a single, intentional light theme. Force it before any script or
       paint so a stale "dark" preference from an earlier build can't apply the
       base dark-theme rules (which would collide with the noir palette). -->
  <script>
    (function () {
      try { localStorage.setItem("pharmadesk.theme", "light"); } catch (e) {}
      document.documentElement.setAttribute("data-theme", "light");
    })();
  </script>
  <title>PharmaDesk — Independent Pharmacy Operator</title>
  <meta name="description" content="A focused black-and-white operations console for an independent community pharmacy. Demonstration only." />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PharmaDesk" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="v3/v3.css" />
  <link rel="stylesheet" href="v3/noir.css" />
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">℞</span>
        <div>
          <div class="brand-name">PharmaDesk</div>
          <div class="brand-sub">Operator</div>
        </div>
      </div>
      <nav class="nav" id="nav">
        <button class="nav-item active" data-view="dashboard"><span class="ni-ico">⌂</span> Home</button>
        <button class="nav-item" data-view="dispensinghub"><span class="ni-ico">℞</span> Dispense</button>
        <button class="nav-item" data-view="patienthub"><span class="ni-ico">◉</span> Patients</button>
        <button class="nav-item" data-view="inventoryhub"><span class="ni-ico">□</span> Inventory</button>
        <button class="nav-item" data-view="pbmhub"><span class="ni-ico">$</span> PBM</button>
        <button class="nav-item" data-view="toolshub"><span class="ni-ico"><svg class="ni-svg" viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg></span> Tools</button>
      </nav>
      <div class="sidebar-foot">
        <button id="resetData" class="link-btn" title="Restore demo data">↺ Reset demo data</button>
        <div class="muted small">Fictional demo data · not for patient care</div>
        <div class="build-tag">PharmaDesk · Noir · refreshed Jun 2026</div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="topbar">
        <h1 id="viewTitle">⌂ Home</h1>
        <div class="topbar-right">
          <button class="btn sm primary" id="startTour" type="button">Take a tour</button>
          <button class="btn sm" id="printBrief" type="button">Print brief</button>
          <input id="globalSearch" class="search" type="search" placeholder="Search patients, drugs, Rx…" />
          <div class="user-chip">
            <span class="avatar">KA</span>
            <div class="user-meta">
              <div class="user-name">K. Adeyemi, PharmD</div>
              <div class="muted small">PIC / owner-operator</div>
            </div>
          </div>
        </div>
      </header>
      <section id="view" class="view"></section>
    </main>
  </div>

  <!-- Modal, palette & toast hosts -->
  <div id="modalRoot"></div>
  <div id="paletteRoot"></div>
  <div id="toastRoot" class="toast-root" role="status" aria-live="polite"></div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="v3/v3.js"></script>
  <script src="v3/operator-upgrades.js"></script>
  <script src="v3/view-mode.js"></script>
  <script src="v3/import-center.js"></script>
  <script src="v3/streamline.js"></script>
  <script src="v3/final-router.js"></script>
  <script src="v3/command.js"></script>
  <script>
    // Register service worker (offline / installable PWA) with seamless auto-update.
    if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
      let reloading = false;
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (reloading) return; reloading = true; location.reload();
      });
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").then((reg) => {
          reg.update();
          setInterval(() => reg.update(), 60000);
        }).catch(() => {});
      });
    }
  </script>
</body>
</html>
