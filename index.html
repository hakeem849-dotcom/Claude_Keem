<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PharmaDesk — Independent Pharmacy Manager</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark">℞</span>
        <div>
          <div class="brand-name">PharmaDesk</div>
          <div class="brand-sub">Independent Pharmacy</div>
        </div>
      </div>
      <nav class="nav" id="nav">
        <button class="nav-item active" data-view="dashboard"><span class="ni-ico">📊</span> Dashboard</button>
        <button class="nav-item" data-view="prescriptions"><span class="ni-ico">℞</span> Dispensing Queue</button>
        <button class="nav-item" data-view="patients"><span class="ni-ico">👤</span> Patients</button>
        <button class="nav-item" data-view="inventory"><span class="ni-ico">📦</span> Inventory</button>
        <button class="nav-item" data-view="interactions"><span class="ni-ico">⚠️</span> Interaction Checker</button>
        <button class="nav-item" data-view="controlled"><span class="ni-ico">🔒</span> Controlled Log</button>
        <button class="nav-item" data-view="immunizations"><span class="ni-ico">💉</span> Immunizations</button>
        <button class="nav-item" data-view="reports"><span class="ni-ico">📈</span> Business Reports</button>
      </nav>
      <div class="sidebar-foot">
        <button id="resetData" class="link-btn" title="Restore demo data">↺ Reset demo data</button>
        <div class="muted small">Mock data · for demonstration only</div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="topbar">
        <h1 id="viewTitle">Dashboard</h1>
        <div class="topbar-right">
          <input id="globalSearch" class="search" type="search" placeholder="Search patients, drugs, Rx…" />
          <div class="user-chip">
            <span class="avatar">KA</span>
            <div class="user-meta">
              <div class="user-name">K. Adeyemi, PharmD</div>
              <div class="muted small">Pharmacist in charge</div>
            </div>
          </div>
        </div>
      </header>
      <section id="view" class="view"></section>
    </main>
  </div>

  <!-- Modal host -->
  <div id="modalRoot"></div>
  <div id="toastRoot" class="toast-root"></div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
